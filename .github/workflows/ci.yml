name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q src app

      - name: Check CLI entrypoints
        run: |
          python -m src.run_pipeline --help
          python -m src.inference.predict --help

      - name: Validate dataset metadata
        run: python -m src.utils.validate_dataset --allow_missing

      - name: Validate final inference artifacts
        run: python -m src.utils.validate_final_artifacts --allow_missing

      - name: Validate LOGO baseline artifacts
        run: |
          if [ -f reports/logo_summary.csv ]; then
            python -m src.utils.validate_logo_baseline --allow_missing_details
          else
            echo "reports/logo_summary.csv not found; skipping LOGO baseline validation."
          fi

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
